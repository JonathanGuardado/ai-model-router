weight_policy:
  priority_weight_adjustments: &standard_priority_weight_adjustments
    latency:
      latency: 1.5
    quality:
      coding: 0.8
      reasoning: 1.0
      reliability: 0.6
    reliability:
      reliability: 1.5
  budget_weight_adjustments: &standard_budget_weight_adjustments
    economy:
      cost: 1.8
      latency: 0.4
      reasoning: -0.3
    premium:
      reasoning: 1.1
      reliability: 0.8
      cost: -0.5

task_profiles:
  - capability: default
    preferred_tiers: []
    preferred_tags: []
    required_constraints: {}
    scoring_weights:
      coding: 0.8
      reasoning: 0.8
      latency: 0.7
      cost: 0.7
      reliability: 1.0
    priority_weight_adjustments: *standard_priority_weight_adjustments
    budget_weight_adjustments: *standard_budget_weight_adjustments
    boosts:
      preferred_tier: 1.0
      preferred_tag: 0.6
      retry_premium: 1.5
    penalties:
      low_reliability_threshold: 6.0
      low_reliability: 2.0
    escalation:
      premium_on_retry: true
      retry_reasoning_threshold: 8.0
    fallback_count: 2

  - capability: trivial.classify
    preferred_tiers: [local_fast]
    preferred_tags: [trivial, fast]
