    budget_weight_adjustments: *standard_budget_weight_adjustments
    boosts:
      preferred_tier: 2.0
      preferred_tag: 1.0
      retry_premium: 0.5
    penalties:
      low_reliability_threshold: 5.0
      low_reliability: 1.5
    escalation:
      premium_on_retry: false
      retry_reasoning_threshold: 9.0
    fallback_count: 2

